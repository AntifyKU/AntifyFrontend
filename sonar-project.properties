# Project identification
sonar.projectKey=AntifyKU_AntifyFrontend
sonar.organization=antifyku

# Source paths
sonar.sources=app,components,constants,context,hooks,services,types,utils

# Exclusions
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  .expo/**,\
  coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/babel.config.js,\
  **/metro.config.js,\
  **/tailwind.config.js

# Encoding & language
sonar.sourceEncoding=UTF-8

# Ignore coverage for areas without automated tests yet
sonar.coverage.exclusions=\
  app/**,\
  components/**,\
  constants/**,\
  context/**,\
  types/**,\
  hooks/**,\
  **/*.d.ts,\
  jest.setup.ts

# TypeScript tsconfig
sonar.typescript.tsconfigPath=tsconfig.json